<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날씨 달력 빌더 & 실시간 체험판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .builder-card { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .code-area { background: #212529; color: #00ff41; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.85rem; }
        .preview-scroll { max-height: 400px; overflow-y: auto; background: #fff; border: 1px solid #dee2e6; border-radius: 10px; padding: 15px; }
        .weather-header { border-left: 5px solid #0d6efd; padding-left: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">🌤️ 날씨 달력 빌더 & 체험판</h1>
        <p class="text-muted">주소를 검색하고 실제 예보 데이터를 확인하여 코드를 생성하세요.</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="builder-card p-4 h-100">
                <h5 class="fw-bold mb-4">1. 지역 및 인증 설정</h5>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold">기상청 API 키 (Decoding)</label>
                    <input type="password" id="apiKey" class="form-control" placeholder="인증키를 입력하세요">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">지역 검색</label>
                    <button class="btn btn-outline-primary w-100" onclick="searchAddr()">🏠 주소 찾기</button>
                    <input type="text" id="displayAddr" class="form-control mt-2 bg-light" readonly placeholder="선택된 주소">
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <label class="form-label small">NX</label>
                        <input type="text" id="nx" class="form-control" value="60" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small">NY</label>
                        <input type="text" id="ny" class="form-control" value="127" readonly>
                    </div>
                </div>

                <h6 class="fw-bold mb-2">💻 복사할 Python 설정값</h6>
                <div class="code-area" id="codeOut">주소를 검색해 주세요.</div>
                <button class="btn btn-dark w-100 mt-2" onclick="copyCode()">코드 복사하기</button>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="builder-card p-4 h-100">
                <h5 class="fw-bold mb-4">2. 실시간 달력 미리보기</h5>
                <button class="btn btn-primary w-100 mb-4" onclick="fetchPreview()">실제 데이터 불러오기</button>
                
                <div id="loading" class="text-center d-none py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">기상청 서버와 통신 중...</p>
                </div>

                <div id="previewArea" class="preview-scroll">
                    <p class="text-center text-muted pt-5">키 입력과 주소 검색 후 버튼을 눌러주세요.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // NX, NY 변환 함수 (수학 공식)
    function getGrid(lat, lng) {
        const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136;
        const DEGRAD = Math.PI / 180.0, re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
        let sn = Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5);
        sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(sn);
        let sf = Math.tan(Math.PI * 0.25 + slat1 * 0.5);
        sf = Math.pow(sf, sn) * Math.cos(slat1) / sn;
        let ro = Math.tan(Math.PI * 0.25 + olat * 0.5);
        ro = re * sf / Math.pow(ro, sn);
        let ra = Math.tan(Math.PI * 0.25 + lat * DEGRAD * 0.5);
        ra = re * sf / Math.pow(ra, sn);
        let theta = lng * DEGRAD - olon;
        if (theta > Math.PI) theta -= 2.0 * Math.PI;
        if (theta < -Math.PI) theta += 2.0 * Math.PI;
        theta *= sn;
        return { x: Math.floor(ra * Math.sin(theta) + XO + 0.5), y: Math.floor(ro - ra * Math.cos(theta) + YO + 0.5) };
    }

    function searchAddr() {
        new daum.Postcode({
            oncomplete: function(data) {
                const addr = data.address;
                document.getElementById('displayAddr').value = addr;
                
                // 임시: 정밀 좌표를 위해 시도별 대표 좌표 사용 (실제 위경도는 카카오맵 API 연동 필요)
                // 여기서는 서울 중랑구 기준 샘플입니다.
                const nx = 60, ny = 127; 
                document.getElementById('nx').value = nx;
                document.getElementById('ny').value = ny;

                document.getElementById('codeOut').innerText = `NX, NY = ${nx}, ${ny}\nLOCATION_NAME = "${addr}"\nREG_ID_TEMP = '11B10101'\nREG_ID_LAND = '11B00000'`;
            }
        }).open();
    }

    async function fetchPreview() {
        const key = document.getElementById('apiKey').value;
        const nx = document.getElementById('nx').value;
        const ny = document.getElementById('ny').value;
        const loc = document.getElementById('displayAddr').value;

        if(!key || !loc) { alert("API 키와 주소를 확인해주세요."); return; }

        const area = document.getElementById('previewArea');
        const loader = document.getElementById('loading');
        loader.classList.remove('d-none');
        area.classList.add('d-none');

        const baseDate = new Date().toISOString().split('T')[0].replace(/-/g, '');
        const url = `https://apihub.kma.go.kr/api/typ02/openApi/VilageFcstInfoService_2.0/getVilageFcst?dataType=JSON&base_date=${baseDate}&base_time=0500&nx=${nx}&ny=${ny}&numOfRows=200&authKey=${key}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            const items = data.response.body.items.item;
            const today = items.filter(i => i.fcstDate === baseDate);

            let html = `<div class="weather-header"><h4 class="fw-bold">📍 ${loc}</h4><p class="text-muted small">오늘의 실시간 예보 리스트</p></div>`;
            
            const hourly = {};
            today.forEach(i => {
                if(!hourly[i.fcstTime]) hourly[i.fcstTime] = {};
                hourly[i.fcstTime][i.category] = i.fcstValue;
            });

            Object.keys(hourly).sort().forEach(t => {
                const h = hourly[t];
                html += `<div class="py-2 border-bottom">[${parseInt(t.slice(0,2))}시] 🌡️ ${h.TMP}°C (☔${h.POP}% 💧${h.REH}% 💨${h.WSD}m/s)</div>`;
            });
            area.innerHTML = html;
        } catch (e) {
            area.innerHTML = `<div class="alert alert-danger">불러오기 실패: 키가 올바른지, 혹은 브라우저에서 CORS 차단이 되었는지 확인하세요.</div>`;
        } finally {
            loader.classList.add('d-none');
            area.classList.remove('d-none');
        }
    }

    function copyCode() {
        navigator.clipboard.writeText(document.getElementById('codeOut').innerText);
        alert("복사 완료!");
    }
</script>
</body>
</html>
