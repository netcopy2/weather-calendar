name: Update Weather ICS

on:
  schedule:
    # 기상청 발표 15분 뒤 실행 (KST 기준 02:15, 05:15 ... 23:15)
    - cron: '15 17,20,23,2,5,8,11,14 * * *'
  push:
    paths:
      - 'update_calendar.py'
    branches:
      - main
  workflow_dispatch:

# 🌟 권한 설정 추가 (exit code 128 해결 핵심)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 🌟 최신 버전(v4, v5)으로 업데이트 (Node.js 경고 해결)
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz icalendar

      - name: Run update script
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          TZ: Asia/Seoul
        run: python update_calendar.py

      - name: Commit and Push changes
        run: |
          KST_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add weather.ics
          # 변경사항이 있을 때만 실행
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update weather.ics [$KST_TIME KST]"
            git push
          else
            echo "No changes to commit"
          fi
